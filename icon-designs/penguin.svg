<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0a0a"/>
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#00ff41" stroke-width="1"/>

  <!-- head -->
  <rect x="11" y="6" width="10" height="1" fill="#00ff41"/>
  <rect x="10" y="7" width="1" height="5" fill="#00ff41"/>
  <rect x="21" y="7" width="1" height="5" fill="#00ff41"/>
  <rect x="11" y="12" width="10" height="1" fill="#00ff41"/>

  <!-- eyes -->
  <rect x="12" y="8" width="3" height="2" fill="#00ff41"/>
  <rect x="13" y="8" width="1" height="2" fill="#0a0a0a"/>
  
  <rect x="17" y="8" width="3" height="2" fill="#00ff41"/>
  <rect x="18" y="8" width="1" height="2" fill="#0a0a0a"/>

  <!-- beak -->
  <rect x="15" y="10" width="2" height="1" fill="#00cc33"/>
  <rect x="14" y="11" width="4" height="1" fill="#00cc33"/>

  <!-- body (oval) -->
  <rect x="10" y="13" width="12" height="1" fill="#00ff41"/>
  <rect x="9" y="14" width="1" height="9" fill="#00ff41"/>
  <rect x="22" y="14" width="1" height="9" fill="#00ff41"/>
  <rect x="10" y="23" width="12" height="1" fill="#00ff41"/>

  <!-- belly (white/lighter area) -->
  <rect x="12" y="15" width="8" height="1" fill="#00cc33"/>
  <rect x="11" y="16" width="10" height="5" fill="#00cc33"/>
  <rect x="12" y="21" width="8" height="1" fill="#00cc33"/>

  <!-- wings/flippers -->
  <rect x="7" y="15" width="3" height="1" fill="#00ff41"/>
  <rect x="6" y="16" width="2" height="4" fill="#00ff41"/>
  <rect x="7" y="20" width="2" height="1" fill="#00ff41"/>
  
  <rect x="22" y="15" width="3" height="1" fill="#00ff41"/>
  <rect x="24" y="16" width="2" height="4" fill="#00ff41"/>
  <rect x="23" y="20" width="2" height="1" fill="#00ff41"/>

  <!-- feet -->
  <rect x="11" y="24" width="3" height="1" fill="#00cc33"/>
  <rect x="10" y="25" width="2" height="1" fill="#00cc33"/>
  <rect x="13" y="25" width="2" height="1" fill="#00cc33"/>
  
  <rect x="18" y="24" width="3" height="1" fill="#00cc33"/>
  <rect x="18" y="25" width="2" height="1" fill="#00cc33"/>
  <rect x="21" y="25" width="2" height="1" fill="#00cc33"/>
</svg>
