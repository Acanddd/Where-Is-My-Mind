<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0a0a"/>
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#00ff41" stroke-width="1"/>

  <!-- penguin body -->
  <rect x="10" y="8" width="12" height="1" fill="#00ff41"/>
  <rect x="9" y="9" width="1" height="12" fill="#00ff41"/>
  <rect x="22" y="9" width="1" height="12" fill="#00ff41"/>
  <rect x="10" y="21" width="12" height="1" fill="#00ff41"/>

  <!-- belly (white area) -->
  <rect x="12" y="12" width="8" height="7" fill="#00cc33"/>

  <!-- eyes -->
  <rect x="12" y="10" width="2" height="2" fill="#00ff41"/>
  <rect x="18" y="10" width="2" height="2" fill="#00ff41"/>
  <rect x="13" y="10" width="1" height="2" fill="#0a0a0a"/>
  <rect x="19" y="10" width="1" height="2" fill="#0a0a0a"/>

  <!-- beak/bill -->
  <rect x="14" y="13" width="4" height="1" fill="#00ff41"/>
  <rect x="15" y="14" width="2" height="1" fill="#00ff41"/>

  <!-- wings -->
  <rect x="7" y="12" width="3" height="1" fill="#00ff41"/>
  <rect x="6" y="13" width="1" height="4" fill="#00ff41"/>
  <rect x="7" y="17" width="3" height="1" fill="#00ff41"/>
  
  <rect x="22" y="12" width="3" height="1" fill="#00ff41"/>
  <rect x="25" y="13" width="1" height="4" fill="#00ff41"/>
  <rect x="22" y="17" width="3" height="1" fill="#00ff41"/>

  <!-- feet -->
  <rect x="10" y="22" width="4" height="1" fill="#00ff41"/>
  <rect x="9" y="23" width="2" height="1" fill="#00ff41"/>
  <rect x="13" y="23" width="2" height="1" fill="#00ff41"/>

  <rect x="18" y="22" width="4" height="1" fill="#00ff41"/>
  <rect x="18" y="23" width="2" height="1" fill="#00ff41"/>
  <rect x="22" y="23" width="2" height="1" fill="#00ff41"/>
</svg>
