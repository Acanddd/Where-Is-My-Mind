<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0a0a"/>
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#00ff41" stroke-width="1"/>

  <!-- left ear (long) -->
  <rect x="9"  y="3"  width="3" height="1" fill="#00ff41"/>
  <rect x="9"  y="4"  width="1" height="6" fill="#00ff41"/>
  <rect x="11" y="4"  width="1" height="6" fill="#00ff41"/>
  <rect x="9"  y="10" width="3" height="1" fill="#00ff41"/>
  <rect x="10" y="5"  width="1" height="4" fill="#00cc33"/>

  <!-- right ear (long) -->
  <rect x="20" y="3"  width="3" height="1" fill="#00ff41"/>
  <rect x="20" y="4"  width="1" height="6" fill="#00ff41"/>
  <rect x="22" y="4"  width="1" height="6" fill="#00ff41"/>
  <rect x="20" y="10" width="3" height="1" fill="#00ff41"/>
  <rect x="21" y="5"  width="1" height="4" fill="#00cc33"/>

  <!-- head -->
  <rect x="10" y="11" width="12" height="1" fill="#00ff41"/>
  <rect x="9"  y="12" width="1"  height="7" fill="#00ff41"/>
  <rect x="22" y="12" width="1"  height="7" fill="#00ff41"/>
  <rect x="10" y="19" width="12" height="1" fill="#00ff41"/>

  <!-- eyes -->
  <rect x="12" y="13" width="2" height="2" fill="#00ff41"/>
  <rect x="13" y="14" width="1" height="1" fill="#0a0a0a"/>

  <rect x="18" y="13" width="2" height="2" fill="#00ff41"/>
  <rect x="18" y="14" width="1" height="1" fill="#0a0a0a"/>

  <!-- nose -->
  <rect x="15" y="16" width="2" height="1" fill="#00ff41"/>

  <!-- mouth (Y shape) -->
  <rect x="15" y="17" width="2" height="1" fill="#00cc33"/>
  <rect x="14" y="18" width="2" height="1" fill="#00cc33"/>
  <rect x="16" y="18" width="2" height="1" fill="#00cc33"/>

  <!-- body -->
  <rect x="10" y="20" width="12" height="1" fill="#00ff41"/>
  <rect x="9"  y="21" width="1"  height="5" fill="#00ff41"/>
  <rect x="22" y="21" width="1"  height="5" fill="#00ff41"/>
  <rect x="10" y="26" width="12" height="1" fill="#00ff41"/>

  <!-- front paws -->
  <rect x="11" y="27" width="3" height="1" fill="#00ff41"/>
  <rect x="18" y="27" width="3" height="1" fill="#00ff41"/>
</svg>
