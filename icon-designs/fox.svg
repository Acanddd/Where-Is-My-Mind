<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0a0a"/>
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#00ff41" stroke-width="1"/>

  <!-- fox head -->
  <rect x="11" y="8" width="10" height="1" fill="#00ff41"/>
  <rect x="10" y="9" width="1" height="7" fill="#00ff41"/>
  <rect x="21" y="9" width="1" height="7" fill="#00ff41"/>
  <rect x="11" y="16" width="10" height="1" fill="#00ff41"/>

  <!-- ears (pointy) -->
  <rect x="9" y="6" width="2" height="1" fill="#00ff41"/>
  <rect x="10" y="7" width="2" height="1" fill="#00ff41"/>
  
  <rect x="20" y="7" width="2" height="1" fill="#00ff41"/>
  <rect x="21" y="6" width="2" height="1" fill="#00ff41"/>

  <!-- eyes -->
  <rect x="12" y="10" width="2" height="2" fill="#00ff41"/>
  <rect x="13" y="10" width="1" height="2" fill="#0a0a0a"/>
  
  <rect x="18" y="10" width="2" height="2" fill="#00ff41"/>
  <rect x="19" y="10" width="1" height="2" fill="#0a0a0a"/>

  <!-- snout -->
  <rect x="14" y="13" width="4" height="2" fill="#00cc33"/>
  <rect x="15" y="13" width="2" height="1" fill="#00ff41"/>

  <!-- body -->
  <rect x="10" y="17" width="12" height="1" fill="#00ff41"/>
  <rect x="9" y="18" width="1" height="6" fill="#00ff41"/>
  <rect x="22" y="18" width="1" height="6" fill="#00ff41"/>
  <rect x="10" y="24" width="12" height="1" fill="#00ff41"/>

  <!-- chest marking -->
  <rect x="14" y="19" width="4" height="4" fill="#00cc33"/>

  <!-- legs -->
  <rect x="9" y="25" width="3" height="2" fill="#00ff41"/>
  <rect x="20" y="25" width="3" height="2" fill="#00ff41"/>

  <!-- tail (bushy) -->
  <rect x="23" y="20" width="3" height="1" fill="#00ff41"/>
  <rect x="25" y="19" width="2" height="1" fill="#00ff41"/>
  <rect x="25" y="21" width="2" height="1" fill="#00ff41"/>
  <rect x="26" y="18" width="1" height="4" fill="#00ff41"/>
  <rect x="27" y="17" width="1" height="1" fill="#00ff41"/>
  <rect x="27" y="22" width="1" height="1" fill="#00ff41"/>
</svg>
