<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0a0a"/>
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#00ff41" stroke-width="1"/>

  <!-- frog head -->
  <rect x="8" y="10" width="16" height="1" fill="#00ff41"/>
  <rect x="7" y="11" width="1" height="6" fill="#00ff41"/>
  <rect x="24" y="11" width="1" height="6" fill="#00ff41"/>
  <rect x="8" y="17" width="16" height="1" fill="#00ff41"/>

  <!-- eyes (bulging) -->
  <rect x="9" y="7" width="4" height="1" fill="#00ff41"/>
  <rect x="8" y="8" width="1" height="3" fill="#00ff41"/>
  <rect x="13" y="8" width="1" height="3" fill="#00ff41"/>
  <rect x="9" y="11" width="4" height="1" fill="#00ff41"/>
  <rect x="10" y="9" width="2" height="2" fill="#00ff41"/>
  <rect x="11" y="9" width="1" height="2" fill="#0a0a0a"/>

  <rect x="19" y="7" width="4" height="1" fill="#00ff41"/>
  <rect x="18" y="8" width="1" height="3" fill="#00ff41"/>
  <rect x="23" y="8" width="1" height="3" fill="#00ff41"/>
  <rect x="19" y="11" width="4" height="1" fill="#00ff41"/>
  <rect x="20" y="9" width="2" height="2" fill="#00ff41"/>
  <rect x="21" y="9" width="1" height="2" fill="#0a0a0a"/>

  <!-- smile -->
  <rect x="11" y="14" width="2" height="1" fill="#00cc33"/>
  <rect x="19" y="14" width="2" height="1" fill="#00cc33"/>
  <rect x="13" y="15" width="6" height="1" fill="#00cc33"/>

  <!-- body -->
  <rect x="10" y="18" width="12" height="1" fill="#00ff41"/>
  <rect x="9" y="19" width="1" height="4" fill="#00ff41"/>
  <rect x="22" y="19" width="1" height="4" fill="#00ff41"/>
  <rect x="10" y="23" width="12" height="1" fill="#00ff41"/>

  <!-- front legs -->
  <rect x="7" y="20" width="3" height="1" fill="#00ff41"/>
  <rect x="6" y="21" width="2" height="2" fill="#00ff41"/>
  
  <rect x="22" y="20" width="3" height="1" fill="#00ff41"/>
  <rect x="24" y="21" width="2" height="2" fill="#00ff41"/>

  <!-- back legs -->
  <rect x="9" y="24" width="3" height="1" fill="#00ff41"/>
  <rect x="7" y="25" width="2" height="2" fill="#00ff41"/>
  
  <rect x="20" y="24" width="3" height="1" fill="#00ff41"/>
  <rect x="23" y="25" width="2" height="2" fill="#00ff41"/>
</svg>
